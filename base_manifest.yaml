schema_version: 1

project:
  name: base-demo

brewfile: Brewfile

health:
  required_env:
    - BASE_DEMO_ENV
  required_ports:
    - name: go-api
      host: 127.0.0.1
      port: 8010
      state: free

python:
  requires_python: "3.13"

mise: .mise.toml

activate:
  source:
    - .base/activate.sh

commands:
  hello: ./src/hello.sh
  env: ./src/env.sh
  manifest: ./src/manifest.sh
  python-info: ./bin/base-demo-python-info
  services: ./bin/base-demo-services
  environments: ./bin/base-demo-environments

build:
  default:
    - info
  targets:
    info:
      description: Print project build info.
      command: ./src/build-info.sh
    go-api:
      description: Build the Go API service.
      working_dir: services/go-api
      command: mkdir -p build && CGO_ENABLED=0 go build -o build/go-api .
    python-api:
      description: Validate the Python API service.
      command: ./services/python-api/build.sh
    java-gradle-api:
      description: Build the Java Gradle API service.
      command: ./services/java-gradle-api/build.sh
    java-maven-api:
      description: Build the Java Maven API service.
      command: ./services/java-maven-api/build.sh
    c-service:
      description: Build the native C service.
      command: ./services/c-service/build.sh
    cpp-service:
      description: Build the native C++ service.
      command: ./services/cpp-service/build.sh
    demo-console:
      description: Build the React/Vite demo console.
      command: ./services/demo-console/build.sh

test:
  command: ./tests/validate.sh

demo:
  script: ./demo/demo.sh
  description: Interactive walkthrough of Base-managed project conventions

artifacts:
  - type: tool
    name: bats-core
    version: latest
